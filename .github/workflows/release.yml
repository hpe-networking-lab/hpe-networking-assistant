name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(python -c "import json;print(json.load(open('manifest.json'))['version'])")
          echo "Tag=$TAG  Manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Build .dxt package
        run: python scripts/build_extension.py

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.dxt > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HPE Networking Assistant ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES.md
          files: |
            dist/*.dxt
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
